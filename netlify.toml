# Netlify config when building from repo root
# If your Netlify "Base directory" is set to "client", delete this file and use client/netlify.toml instead.

[build]
  base    = "client"
  command = "npm run build"
  publish = "client/build"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS    = "--legacy-peer-deps"
